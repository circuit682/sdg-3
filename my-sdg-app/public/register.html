<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/auth.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <title>Register</title>
</head>
<body>
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>

    <main class="auth-shell">
        <section class="auth-copy">
            <p class="kicker">New Here?</p>
            <h1>Start Building Healthier Habits</h1>
            <p>Create your account to unlock goals, assessments, visual trends, and guided action resources.</p>
            <a class="back-link" href="/">Back to Overview</a>
        </section>

        <section class="auth-card-wrap">
            <h2>Register</h2>
            <div id="message" style="display: none;"></div>
            <form id="registerForm" class="auth-card">
                <div class="form-group">
                    <label for="name"><i class='bx bx-user'></i>Full Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email"><i class='bx bx-envelope'></i>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class='bx bx-lock'></i>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">Register</button>
                <p class="helper-text">Already have an account? <a href="/login">Login here</a></p>
            </form>
        </section>
    </main>

    <script src="/assets/js/auth.js"></script>
</body>
</html>
